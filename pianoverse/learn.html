<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Piano | PianoVerse</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .learn-page { padding-top: 80px; min-height: 100vh; display: flex; flex-direction: column; }
    .learn-layout { display: grid; grid-template-columns: 300px 1fr; flex: 1; height: calc(100vh - 80px); }
    .learn-sidebar { background: var(--bg-card); border-right: 1px solid var(--border); overflow-y: auto; }
    .sidebar-search { padding: 16px; border-bottom: 1px solid var(--border); }
    .sidebar-search input { width:100%; background: rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text-primary); font-family:var(--font-body); font-size:0.85rem; outline:none; }
    .lesson-group-title { padding: 12px 20px 6px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
    .lesson-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; transition: var(--transition); border-left: 2px solid transparent; }
    .lesson-item:hover { background: rgba(255,255,255,0.03); }
    .lesson-item.active { background: rgba(0,200,255,0.06); border-left-color: var(--accent-blue); }
    .lesson-num { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; flex-shrink: 0; }
    .lesson-item.done .lesson-num { background: rgba(16,185,129,0.15); border-color: #10b981; color: #10b981; }
    .lesson-item.locked .lesson-num { opacity: 0.4; }
    .lesson-title { font-size: 0.84rem; font-weight: 500; }
    .lesson-meta { font-size: 0.72rem; color: var(--text-muted); }
    .learn-main { overflow-y: auto; padding: 40px; }
    .lesson-content h2 { font-size: 1.8rem; letter-spacing: -0.5px; margin-bottom: 8px; }
    .lesson-content .lesson-subtitle { color: var(--text-secondary); margin-bottom: 32px; }
    .lesson-video-placeholder { background: linear-gradient(135deg, #0d1024, #080b18); border: 1px solid var(--border); border-radius: 16px; height: 280px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; margin-bottom: 32px; cursor: pointer; transition: var(--transition); }
    .lesson-video-placeholder:hover { border-color: var(--border-active); }
    .play-icon { width: 64px; height: 64px; background: rgba(0,200,255,0.1); border: 2px solid var(--border-active); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .lesson-steps { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }
    .lesson-step { display: flex; gap: 16px; padding: 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; }
    .step-num { width: 32px; height: 32px; background: rgba(0,200,255,0.1); border: 1px solid var(--border-active); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 800; color: var(--accent-blue); flex-shrink: 0; }
    .step-body h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
    .step-body p { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; }
    .lesson-piano-demo { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .highlighted-key { background: rgba(0,200,255,0.2) !important; border-color: var(--accent-blue) !important; box-shadow: 0 0 12px rgba(0,200,255,0.4) !important; }
    .lesson-nav-btns { display: flex; gap: 12px; }
    @media (max-width:768px) { .learn-layout { grid-template-columns:1fr; } .learn-sidebar { height: 240px; } }
  </style>
</head>
<body>
<nav class="navbar" style="position:fixed;">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Piano<span>Verse</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li><li><a href="play.html">Play</a></li>
      <li><a href="songs.html">Songs</a></li><li><a href="learn.html" class="active">Learn</a></li>
      <li><a href="themes.html">Themes</a></li><li><a href="download.html">Download</a></li>
    </ul>
    <div class="nav-cta">
      <a href="play.html" class="btn btn-primary">🎹 Play Now</a>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<div class="learn-page">
  <div class="learn-layout">
    <!-- Sidebar -->
    <div class="learn-sidebar">
      <div class="sidebar-search">
        <input type="text" placeholder="🔍 Search lessons…" oninput="filterLessons(this.value)">
      </div>
      <div id="lessonList"></div>
    </div>

    <!-- Main Content -->
    <div class="learn-main" id="learnMain">
      <div class="lesson-content" id="lessonContent"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="assets/js/app.js"></script>
<script>
const LESSONS = [
  { id:1, group:'Foundations', title:'Piano Basics', subtitle:'Learn the layout, posture, and hand position', duration:'5 min', done:true, locked:false, steps:[
    { title:'Meet the Keyboard', body:'A standard piano has 88 keys — 52 white and 36 black. White keys play natural notes (A-G), black keys play sharps and flats.' },
    { title:'Hand Position', body:'Curve your fingers naturally as if holding a ball. Keep your wrists relaxed and your forearms parallel to the floor.' },
    { title:'Sitting at the Piano', body:'Sit at the center of the keyboard, feet flat on the floor. Your elbows should be roughly level with the keys.' },
    { title:'Finding Middle C', body:'Middle C is the white key immediately left of a group of two black keys, roughly in the center of the keyboard.' },
  ]},
  { id:2, group:'Foundations', title:'Reading Sheet Music', subtitle:'Treble clef, bass clef, and note values', duration:'8 min', done:true, locked:false, steps:[
    { title:'The Staff', body:'Music is written on five horizontal lines called the staff. The treble clef (right hand) and bass clef (left hand) indicate pitch range.' },
    { title:'Note Values', body:'A whole note = 4 beats, half note = 2 beats, quarter note = 1 beat, eighth note = 0.5 beats.' },
    { title:'Ledger Lines', body:'Notes that extend beyond the staff use ledger lines. Middle C sits on a ledger line between treble and bass clef.' },
  ]},
  { id:3, group:'Foundations', title:'Your First Notes', subtitle:'Play C, D, E, F, G with your right hand', duration:'6 min', done:false, locked:false, steps:[
    { title:'Right Hand Position', body:'Place your thumb (finger 1) on Middle C. Each finger naturally covers one key: D, E, F, G.' },
    { title:'Five-Finger Exercise', body:'Practice playing C-D-E-F-G and back, slowly and evenly. Focus on pressing each key fully.' },
    { title:'Using the Keyboard', body:'On this page, use keyboard keys A S D F G or click the highlighted keys below to practice.' },
  ]},
  { id:4, group:'Beginner Songs', title:'Twinkle Twinkle', subtitle:'Your first complete song, step by step', duration:'10 min', done:false, locked:false, steps:[
    { title:'Melody Notes', body:'Twinkle Twinkle uses: C C G G A A G — F F E E D D C. Practice each phrase slowly before connecting them.' },
    { title:'Rhythm', body:'Each note gets one beat. Count "1-2-3-4" to keep steady time. The song is in 4/4 time.' },
    { title:'Hands Together', body:'Once comfortable with the right hand, add a simple C-F-G chord pattern in the left hand.' },
  ]},
  { id:5, group:'Beginner Songs', title:'Für Elise (Opening)', subtitle:'Learn the iconic Beethoven intro phrase', duration:'15 min', done:false, locked:false, steps:[
    { title:'The Famous Motif', body:'The opening is: E D# E D# E B D C A. Practice extremely slowly — accuracy before speed.' },
    { title:'Left Hand Pattern', body:'While the right hand plays the melody, the left hand plays a rolling Am chord: A-E-A.' },
    { title:'Connecting Phrases', body:'The melody goes silent briefly before the lyrical middle section. Listen carefully to the original recording.' },
  ]},
  { id:6, group:'Intermediate', title:'Chord Progressions', subtitle:'I-V-vi-IV — the most popular chord pattern', duration:'12 min', done:false, locked:false, steps:[
    { title:'What Are Chords?', body:'Chords are three or more notes played simultaneously. The most basic is a triad: root, third, and fifth.' },
    { title:'C Major Chord', body:'C-E-G played together. Practice rolling the chord (arpeggiate) before playing all notes at once.' },
    { title:'The I-V-vi-IV Pattern', body:'In C major: C-G-Am-F. This progression powers hundreds of pop songs from Pachelbel to modern hits.' },
  ]},
  { id:7, group:'Intermediate', title:'Scales & Arpeggios', subtitle:'The foundation of piano technique', duration:'10 min', done:false, locked:false, steps:[
    { title:'C Major Scale', body:'C D E F G A B C. Practice with a metronome, starting at 60 BPM. Use proper fingering: 1-2-3-1-2-3-4-5.' },
    { title:'Thumb Tuck', body:'When the thumb passes under, keep your wrist relaxed and the motion smooth. This is the key to scales.' },
    { title:'Arpeggios', body:'Play chord notes individually across the keyboard. C major arpeggio: C-E-G-C (up), C-G-E-C (down).' },
  ]},
  { id:8, group:'Advanced', title:'Sight Reading', subtitle:'Play new music on the spot', duration:'20 min', done:false, locked:true, steps:[
    { title:'Scanning Ahead', body:'Train your eyes to read 1-2 beats ahead of what you are playing. This prevents hesitation.' },
    { title:'Rhythm First', body:'Clap the rhythm before playing the notes. Understanding rhythm is more important than note accuracy in sight reading.' },
    { title:'Practice Materials', body:'Read through easy pieces at tempo, even with mistakes. Never stop — keep the pulse going.' },
  ]},
];

let currentLessonId = 3;

function filterLessons(q) {
  renderSidebar(q.toLowerCase());
}

function renderSidebar(filter = '') {
  const groups = [...new Set(LESSONS.map(l => l.group))];
  document.getElementById('lessonList').innerHTML = groups.map(g => {
    const lessons = LESSONS.filter(l => l.group === g && (!filter || l.title.toLowerCase().includes(filter)));
    if (!lessons.length) return '';
    return `<div class="lesson-group-title">${g}</div>` +
      lessons.map(l => `
        <div class="lesson-item ${l.done ? 'done' : ''} ${l.locked ? 'locked' : ''} ${l.id === currentLessonId ? 'active' : ''}" onclick="${l.locked ? `PVToast.show('🔒 Complete previous lessons to unlock', 'info')` : `loadLesson(${l.id})`}">
          <div class="lesson-num">${l.done ? '✓' : l.locked ? '🔒' : l.id}</div>
          <div>
            <div class="lesson-title">${l.title}</div>
            <div class="lesson-meta">⏱ ${l.duration} ${l.done ? '· Completed' : ''}</div>
          </div>
        </div>
      `).join('');
  }).join('');
}

function loadLesson(id) {
  const lesson = LESSONS.find(l => l.id === id);
  if (!lesson || lesson.locked) return;
  currentLessonId = id;
  renderSidebar();

  const progress = ((LESSONS.filter(l => l.done).length / LESSONS.length) * 100).toFixed(0);

  document.getElementById('lessonContent').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
      <span style="font-size:0.75rem;color:var(--text-muted);">${lesson.group}</span>
      <span style="color:var(--text-muted);">›</span>
      <span style="font-size:0.75rem;color:var(--text-secondary);">${lesson.title}</span>
    </div>

    <h2>${lesson.title}</h2>
    <p class="lesson-subtitle">${lesson.subtitle}</p>

    <div style="display:flex;align-items:center;gap:16px;margin-bottom:28px;padding:14px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;">
      <div style="flex:1;">
        <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:6px;">Your Progress</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      </div>
      <span style="font-size:0.9rem;font-weight:700;color:var(--accent-blue);">${progress}%</span>
    </div>

    <div class="lesson-video-placeholder" onclick="PVToast.show('Video lesson coming soon!', 'info')">
      <div class="play-icon">▶</div>
      <div style="font-size:0.875rem;color:var(--text-secondary);">Watch Lesson Video · ${lesson.duration}</div>
    </div>

    <div class="lesson-steps">
      ${lesson.steps.map((s, i) => `
        <div class="lesson-step">
          <div class="step-num">${i + 1}</div>
          <div class="step-body">
            <h4>${s.title}</h4>
            <p>${s.body}</p>
          </div>
        </div>
      `).join('')}
    </div>

    ${id === 3 ? `
    <div class="lesson-piano-demo">
      <div style="font-weight:700;margin-bottom:16px;">🎹 Practice: Try These Keys</div>
      <div style="display:flex;gap:3px;height:120px;">
        ${['C4','D4','E4','F4','G4'].map(n => `
          <div style="flex:1;background:linear-gradient(180deg,#f8f9ff 0%,#e8eaf0 100%);border:1px solid rgba(0,0,0,0.15);border-radius:0 0 8px 8px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;cursor:pointer;transition:all 0.1s;box-shadow:0 4px 8px rgba(0,0,0,0.2);"
             onmousedown="PVAudio.play('${n.replace(/\d/,'')}',${n.match(/\d/)[0]});this.style.background='linear-gradient(180deg,#d0f0ff 0%,#a0dfff 100%)';this.style.boxShadow='0 0 15px rgba(0,200,255,0.4)'"
             onmouseup="this.style.background='linear-gradient(180deg,#f8f9ff 0%,#e8eaf0 100%)';this.style.boxShadow='0 4px 8px rgba(0,0,0,0.2)'"
             onmouseleave="this.style.background='linear-gradient(180deg,#f8f9ff 0%,#e8eaf0 100%)';this.style.boxShadow='0 4px 8px rgba(0,0,0,0.2)'">
            <span style="font-size:10px;color:rgba(0,0,0,0.3);font-weight:700;">${n}</span>
          </div>
        `).join('')}
      </div>
    </div>` : ''}

    <div class="lesson-nav-btns">
      ${id > 1 ? `<button class="btn btn-secondary" onclick="loadLesson(${id-1})">← Previous</button>` : ''}
      <button class="btn btn-primary" onclick="completeLesson(${id})" style="margin-left:auto;">
        ${lesson.done ? '✓ Completed' : 'Mark Complete & Continue →'}
      </button>
    </div>
  `;
}

function completeLesson(id) {
  const lesson = LESSONS.find(l => l.id === id);
  if (lesson) {
    lesson.done = true;
    const nextLesson = LESSONS.find(l => l.id === id + 1);
    if (nextLesson && nextLesson.locked) nextLesson.locked = false;
    PVToast.show('🎉 Lesson completed! Keep going!', 'success');
    renderSidebar();
    if (nextLesson) setTimeout(() => loadLesson(id + 1), 600);
    else loadLesson(id);
  }
}

renderSidebar();
loadLesson(currentLessonId);
document.getElementById('hamburger').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('open'));
</script>
</body>
</html>
