<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Play piano online — keyboard, mouse or touch. 10 layouts, record your music, Web Audio synthesis.">
  <title>Play Piano | PianoVerse</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎹</text></svg>">
  <style>
    /* Play page overrides */
    body { overflow: hidden; }
    .piano-page { position: fixed; inset: 0; }
    
    .active-note-display {
      position: fixed;
      top: 76px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,200,255,0.1);
      border: 1px solid rgba(0,200,255,0.3);
      border-radius: 50px;
      padding: 6px 20px;
      font-family: monospace;
      font-size: 0.9rem;
      color: var(--accent-blue);
      font-weight: 700;
      min-width: 80px;
      text-align: center;
      transition: all 0.1s;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
    }
    .active-note-display.visible { opacity: 1; }

    .layout-switcher {
      display: flex;
      gap: 6px;
      align-items: center;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .layout-pill {
      padding: 5px 12px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: var(--transition);
      font-family: var(--font-body);
    }
    .layout-pill.active { background: rgba(0,200,255,0.12); border-color: var(--border-active); color: var(--accent-blue); }
    .layout-pill:hover:not(.active) { background: rgba(255,255,255,0.06); color: var(--text-primary); }

    .piano-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: auto;
    }

    .keyboard-wrapper {
      position: relative;
      display: inline-block;
    }

    .pedal-area {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 12px 0;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .pedal {
      width: 60px;
      height: 20px;
      border-radius: 50px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .pedal:hover, .pedal.active {
      background: rgba(0,200,255,0.12);
      border-color: var(--border-active);
      color: var(--accent-blue);
    }

    /* Theme-specific keyboard colors */
    .theme-neon .key-white { background: linear-gradient(180deg, #0a1a2e 0%, #051020 100%); border-color: rgba(0,200,255,0.2); }
    .theme-neon .key-white:hover, .theme-neon .key-white.active { background: linear-gradient(180deg, #002040 0%, #001830 100%); box-shadow: 0 0 20px rgba(0,200,255,0.5), inset 0 0 10px rgba(0,200,255,0.2); }
    .theme-neon .key-black { background: linear-gradient(180deg, #000510 0%, #000008 100%); }
    .theme-neon .key-black:hover, .theme-neon .key-black.active { background: linear-gradient(180deg, #001020 0%, #000510 100%); box-shadow: 0 0 15px rgba(0,200,255,0.4); }
    .theme-neon .key-label { color: rgba(0,200,255,0.4); }
    .theme-neon .key-black .key-label { color: rgba(0,200,255,0.3); }

    .theme-jazz .key-white { background: linear-gradient(180deg, #f5deb3 0%, #deb887 100%); border-color: rgba(101,67,33,0.3); }
    .theme-jazz .key-white:hover, .theme-jazz .key-white.active { background: linear-gradient(180deg, #ffe4a0 0%, #f0c070 100%); box-shadow: 0 0 20px rgba(180,120,40,0.4); }
    .theme-jazz .key-black { background: linear-gradient(180deg, #2d1810 0%, #150c08 100%); }

    .theme-aurora .key-white { background: linear-gradient(180deg, #e0d0ff 0%, #c4b0f8 100%); border-color: rgba(139,92,246,0.3); }
    .theme-aurora .key-white:hover, .theme-aurora .key-white.active { background: linear-gradient(180deg, #d0b8ff 0%, #b090f0 100%); box-shadow: 0 0 20px rgba(139,92,246,0.5); }
    .theme-aurora .key-black { background: linear-gradient(180deg, #1e1040 0%, #0a0520 100%); }

    .theme-glass .key-white { background: linear-gradient(180deg, rgba(200,230,255,0.7) 0%, rgba(150,200,240,0.5) 100%); border-color: rgba(200,220,255,0.3); backdrop-filter: blur(4px); }
    .theme-glass .key-black { background: linear-gradient(180deg, rgba(20,40,80,0.9) 0%, rgba(10,20,50,0.95) 100%); }

    /* Recording panel */
    .recordings-panel {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 280px;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      z-index: 50;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      padding-top: 80px;
    }
    .recordings-panel.open { transform: none; }
    .rec-panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 0.95rem; }
    .rec-panel-body { flex: 1; overflow-y: auto; padding: 16px; }
    .rec-item { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .rec-item-name { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
    .rec-item-meta { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; }
    .rec-item-actions { display: flex; gap: 6px; }
    .rec-action-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 0.72rem; cursor: pointer; transition: var(--transition); font-family: var(--font-body); }
    .rec-action-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

    /* Sheet music display (simplified) */
    .sheet-toggle { padding: 16px 24px; border-top: 1px solid var(--border); }
    
    @media (max-width: 768px) {
      .piano-toolbar { flex-wrap: wrap; padding: 8px 12px; gap: 8px; }
      .piano-container { padding: 12px; }
      .recordings-panel { width: 100%; }
    }
  </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar" style="position:absolute;">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Piano<span>Verse</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="play.html" class="active">Play</a></li>
      <li><a href="songs.html">Songs</a></li>
      <li><a href="learn.html">Learn</a></li>
      <li><a href="themes.html">Themes</a></li>
    </ul>
    <div class="nav-cta">
      <button class="toolbar-btn" id="toggleRecPanel" title="Recordings">🎙 Recordings</button>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<!-- Active Note Display -->
<div class="active-note-display" id="noteDisplay">—</div>

<div class="piano-page" id="pianoPage">
  <!-- Recording Bar -->
  <div class="recording-bar" id="recordingBar">
    <div class="rec-dot"></div>
    <span class="rec-time" id="recTime">0:00</span>
    <span class="rec-notes" id="recNotes">0 notes recorded</span>
    <button onclick="stopRecording()" style="margin-left: auto; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; padding: 4px 14px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-family: var(--font-body);">⏹ Stop</button>
  </div>

  <!-- Toolbar -->
  <div class="piano-toolbar">
    <!-- Layout -->
    <div class="piano-toolbar-group">
      <span class="toolbar-label">Layout</span>
      <div class="layout-switcher" id="layoutSwitcher"></div>
    </div>

    <!-- Octave -->
    <div class="piano-toolbar-group">
      <span class="toolbar-label">Oct</span>
      <button class="toolbar-btn" id="octaveDown" title="Octave Down">▼</button>
      <span id="octaveNum" style="font-size:0.85rem;font-weight:700;color:var(--accent-blue);min-width:16px;text-align:center;">4</span>
      <button class="toolbar-btn" id="octaveUp" title="Octave Up">▲</button>
    </div>

    <!-- Volume -->
    <div class="piano-toolbar-group">
      <span class="toolbar-label">Vol</span>
      <span id="volIcon" style="font-size:1rem;">🔊</span>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70" title="Volume">
      <span id="volNum" style="font-size:0.75rem;color:var(--text-muted);min-width:28px;">70%</span>
    </div>

    <!-- Controls -->
    <div class="piano-toolbar-group" style="margin-left: auto;">
      <button class="toolbar-btn record" id="recordBtn" title="Record">⏺ Record</button>
      <button class="toolbar-btn" id="sustainBtn" title="Sustain Pedal">🎚 Sustain</button>
      <button class="toolbar-btn" id="showKeysBtn" title="Show Key Labels">🔤 Keys</button>
      <button class="toolbar-btn" id="fullscreenBtn" title="Fullscreen">⛶ Full</button>
    </div>
  </div>

  <!-- Piano Container -->
  <div class="piano-container" id="pianoContainer">
    <div class="keyboard-wrapper" id="keyboardWrapper"></div>
  </div>

  <!-- Keyboard Map -->
  <div class="key-map" id="keyMap"></div>
</div>

<!-- Recordings Panel -->
<div class="recordings-panel" id="recordingsPanel">
  <div class="rec-panel-header">🎵 My Recordings</div>
  <div class="rec-panel-body" id="recPanelBody">
    <div style="text-align:center;color:var(--text-muted);font-size:0.85rem;padding:40px 20px;">
      <div style="font-size:2rem;margin-bottom:12px;">🎙</div>
      No recordings yet.<br>Hit Record to start.
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script src="assets/js/app.js"></script>
<script>
// ═══════════════════════════════════════════════════
// Piano Play Engine
// ═══════════════════════════════════════════════════

const LAYOUTS = [
  { id: 'classic88', name: 'Classic 88', keys: 88 },
  { id: 'mini25', name: 'Mini 25', keys: 25 },
  { id: 'neon49', name: 'Neon Glow', keys: 49, theme: 'neon' },
  { id: 'jazz49', name: 'Jazz 49', keys: 49, theme: 'jazz' },
  { id: 'aurora37', name: 'Aurora 37', keys: 37, theme: 'aurora' },
  { id: 'glass49', name: 'Glass 49', keys: 49, theme: 'glass' },
  { id: 'blues', name: 'Blues Scale', keys: 13 },
  { id: 'pentatonic', name: 'Pentatonic', keys: 11 },
];

const NOTE_PATTERN = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ALL_NOTES = [];

// Build all notes A0 to C8
['A0','A#0','B0'].forEach(n => ALL_NOTES.push(n));
for (let oct = 1; oct <= 7; oct++) NOTE_PATTERN.forEach(n => ALL_NOTES.push(n + oct));
ALL_NOTES.push('C8');

const SCALE_KEYS = {
  blues: ['C3','D#3','F3','F#3','G3','A#3','C4','D#4','F4','F#4','G4','A#4','C5'],
  pentatonic: ['C4','D4','E4','G4','A4','C5','D5','E5','G5','A5','C6'],
};

const KEYBOARD_MAP = {
  'a':'C','w':'C#','s':'D','e':'D#','d':'E','f':'F','t':'F#',
  'g':'G','y':'G#','h':'A','u':'A#','j':'B','k':'C+1',
  'z':'C-1','x':'D-1','c':'E-1','v':'F-1','b':'G-1','n':'A-1','m':'B-1',
};

let currentLayout = 'classic88';
let currentTheme = '';
let currentOctave = 4;
let showLabels = true;
let sustainActive = false;
let isRecording = false;
let recordStartTime = 0;
let recordedNotes = [];
let recordings = JSON.parse(localStorage.getItem('pv_recordings') || '[]');
let recTimer = null;
let recNoteCount = 0;
let activeKeys = new Set();

// ─── Build Keyboard ───────────────────────────────
function getNotesForLayout(layoutId) {
  if (layoutId === 'blues') return SCALE_KEYS.blues;
  if (layoutId === 'pentatonic') return SCALE_KEYS.pentatonic;
  
  const countMap = { classic88: 88, mini25: 25, neon49: 49, jazz49: 49, aurora37: 37, glass49: 49 };
  const count = countMap[layoutId] || 49;
  const startIdx = layoutId === 'classic88' ? 0 : layoutId === 'mini25' ? 24 : 12;
  return ALL_NOTES.slice(startIdx, startIdx + count);
}

function buildKeyboard(layoutId) {
  const wrapper = document.getElementById('keyboardWrapper');
  wrapper.innerHTML = '';
  currentLayout = layoutId;
  
  const layout = LAYOUTS.find(l => l.id === layoutId);
  const theme = layout?.theme || '';
  wrapper.className = 'keyboard-wrapper' + (theme ? ` theme-${theme}` : '');
  currentTheme = theme;
  
  const notes = getNotesForLayout(layoutId);
  const keyboard = document.createElement('div');
  keyboard.className = 'piano-keyboard';
  keyboard.style.position = 'relative';
  
  const isSpecialScale = layoutId === 'blues' || layoutId === 'pentatonic';
  
  if (isSpecialScale) {
    // Simple layout for scales
    notes.forEach(noteStr => {
      const isBlack = noteStr.includes('#');
      const key = document.createElement('div');
      key.className = isBlack ? 'key-black' : 'key-white';
      key.dataset.note = noteStr;
      
      if (showLabels) {
        const label = document.createElement('span');
        label.className = 'key-label';
        label.textContent = noteStr.replace(/\d/, '');
        key.appendChild(label);
      }
      
      bindKeyEvents(key, noteStr);
      keyboard.appendChild(key);
    });
  } else {
    // Standard layout with proper black key positioning
    let whiteIdx = 0;
    const whiteKeys = notes.filter(n => !n.includes('#'));
    const keyWidth = 46;
    const blackKeyPositions = { 'C#': 0.65, 'D#': 1.65, 'F#': 3.65, 'G#': 4.65, 'A#': 5.65 };
    
    let wIdx = 0;
    notes.forEach(noteStr => {
      const noteName = noteStr.replace(/\d+/, '');
      const isBlack = noteName.includes('#');
      
      if (!isBlack) {
        const key = document.createElement('div');
        key.className = 'key-white';
        key.dataset.note = noteStr;
        key.dataset.windex = wIdx;
        
        if (showLabels) {
          const label = document.createElement('span');
          label.className = 'key-label';
          label.textContent = noteName + (noteStr.match(/\d+/) || [''])[0];
          key.appendChild(label);
        }
        
        bindKeyEvents(key, noteStr);
        keyboard.appendChild(key);
        wIdx++;
      }
    });
    
    // Now add black keys with absolute positioning
    let lastWhiteIdx = -1;
    notes.forEach(noteStr => {
      const noteName = noteStr.replace(/\d+/, '');
      const isBlack = noteName.includes('#');
      
      if (!isBlack) {
        lastWhiteIdx++;
      } else {
        const key = document.createElement('div');
        key.className = 'key-black';
        key.dataset.note = noteStr;
        key.style.left = (lastWhiteIdx * (keyWidth + 3) + keyWidth - 15) + 'px';
        
        if (showLabels) {
          const label = document.createElement('span');
          label.className = 'key-label';
          label.textContent = noteName;
          key.appendChild(label);
        }
        
        bindKeyEvents(key, noteStr);
        keyboard.appendChild(key);
      }
    });
  }
  
  wrapper.appendChild(keyboard);
  updateKeyMap();
  PVAnalytics.track('layout_change', { layout: layoutId });
}

function bindKeyEvents(key, noteStr) {
  const noteName = noteStr.replace(/\d+/, '');
  const octave = parseInt(noteStr.match(/\d+/)?.[0] || '4');
  
  function pressKey() {
    key.classList.add('active');
    PVAudio.play(noteName, octave);
    showNote(noteStr);
    if (isRecording) {
      recordedNotes.push({ note: noteName, oct: octave, time: Date.now() - recordStartTime });
      recNoteCount++;
      document.getElementById('recNotes').textContent = `${recNoteCount} notes`;
    }
    PVAnalytics.track('keypress', { note: noteStr });
  }
  
  function releaseKey() {
    if (!sustainActive) {
      key.classList.remove('active');
      PVAudio.stop(noteName, octave);
    }
  }
  
  key.addEventListener('mousedown', (e) => { e.preventDefault(); pressKey(); });
  key.addEventListener('mouseup', releaseKey);
  key.addEventListener('mouseleave', releaseKey);
  key.addEventListener('touchstart', (e) => { e.preventDefault(); pressKey(); }, { passive: false });
  key.addEventListener('touchend', (e) => { e.preventDefault(); releaseKey(); }, { passive: false });
}

// ─── Show Active Note ────────────────────────────
let noteHideTimeout;
function showNote(noteStr) {
  const el = document.getElementById('noteDisplay');
  el.textContent = noteStr;
  el.classList.add('visible');
  clearTimeout(noteHideTimeout);
  noteHideTimeout = setTimeout(() => el.classList.remove('visible'), 800);
}

// ─── Keyboard Input ──────────────────────────────
const keyDownNotes = {};

document.addEventListener('keydown', (e) => {
  if (e.repeat || e.target.tagName === 'INPUT') return;
  
  const k = e.key.toLowerCase();
  if (keyDownNotes[k]) return;
  
  const noteBase = KEYBOARD_MAP[k];
  if (!noteBase) return;
  
  let oct = currentOctave;
  let note = noteBase;
  
  if (noteBase.endsWith('+1')) { note = noteBase.replace('+1',''); oct += 1; }
  else if (noteBase.endsWith('-1')) { note = noteBase.replace('-1',''); oct -= 1; }
  
  keyDownNotes[k] = `${note}${oct}`;
  
  // Find and activate the key element
  const keyEl = document.querySelector(`[data-note="${note}${oct}"]`);
  if (keyEl) {
    keyEl.classList.add('active');
    PVAudio.play(note, oct);
    showNote(`${note}${oct}`);
    if (isRecording) {
      recordedNotes.push({ note, oct, time: Date.now() - recordStartTime });
      recNoteCount++;
      document.getElementById('recNotes').textContent = `${recNoteCount} notes`;
    }
  }
});

document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  const noteStr = keyDownNotes[k];
  if (!noteStr) return;
  
  const note = noteStr.replace(/\d+/, '');
  const oct = parseInt(noteStr.match(/\d+/)?.[0] || '4');
  
  if (!sustainActive) {
    const keyEl = document.querySelector(`[data-note="${noteStr}"]`);
    if (keyEl) keyEl.classList.remove('active');
    PVAudio.stop(note, oct);
  }
  delete keyDownNotes[k];
});

// ─── Layout Switcher ─────────────────────────────
function buildLayoutSwitcher() {
  const container = document.getElementById('layoutSwitcher');
  LAYOUTS.forEach(l => {
    const pill = document.createElement('button');
    pill.className = 'layout-pill' + (l.id === currentLayout ? ' active' : '');
    pill.textContent = l.name;
    pill.addEventListener('click', () => {
      document.querySelectorAll('.layout-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      buildKeyboard(l.id);
    });
    container.appendChild(pill);
  });
}

// ─── Octave Controls ─────────────────────────────
document.getElementById('octaveDown').addEventListener('click', () => {
  if (currentOctave > 1) { currentOctave--; document.getElementById('octaveNum').textContent = currentOctave; }
});
document.getElementById('octaveUp').addEventListener('click', () => {
  if (currentOctave < 7) { currentOctave++; document.getElementById('octaveNum').textContent = currentOctave; }
});

// ─── Volume ──────────────────────────────────────
document.getElementById('volumeSlider').addEventListener('input', (e) => {
  const v = e.target.value;
  PVAudio.setVolume(v / 100);
  document.getElementById('volNum').textContent = v + '%';
  document.getElementById('volIcon').textContent = v == 0 ? '🔇' : v < 50 ? '🔉' : '🔊';
});

// ─── Sustain Pedal ───────────────────────────────
document.getElementById('sustainBtn').addEventListener('click', () => {
  sustainActive = !sustainActive;
  document.getElementById('sustainBtn').classList.toggle('active', sustainActive);
  if (!sustainActive) {
    document.querySelectorAll('.key-white.active, .key-black.active').forEach(k => k.classList.remove('active'));
  }
});

// Spacebar = sustain
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
    e.preventDefault();
    sustainActive = true;
    document.getElementById('sustainBtn').classList.add('active');
  }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space') {
    sustainActive = false;
    document.getElementById('sustainBtn').classList.remove('active');
    document.querySelectorAll('.key-white.active, .key-black.active').forEach(k => k.classList.remove('active'));
  }
});

// ─── Key Labels Toggle ───────────────────────────
document.getElementById('showKeysBtn').addEventListener('click', () => {
  showLabels = !showLabels;
  document.getElementById('showKeysBtn').classList.toggle('active', showLabels);
  buildKeyboard(currentLayout);
});

// ─── Fullscreen ──────────────────────────────────
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    document.getElementById('fullscreenBtn').textContent = '⛶ Exit';
  } else {
    document.exitFullscreen();
    document.getElementById('fullscreenBtn').textContent = '⛶ Full';
  }
});

// ─── Recording ───────────────────────────────────
function startRecording() {
  if (isRecording) return;
  PVAudio.init();
  isRecording = true;
  recordStartTime = Date.now();
  recordedNotes = [];
  recNoteCount = 0;
  document.getElementById('recordingBar').classList.add('active');
  document.getElementById('recordBtn').textContent = '⏹ Stop';
  document.getElementById('recordBtn').classList.add('recording');
  
  recTimer = setInterval(() => {
    const elapsed = Math.floor((Date.now() - recordStartTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('recTime').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  clearInterval(recTimer);
  document.getElementById('recordingBar').classList.remove('active');
  document.getElementById('recordBtn').textContent = '⏺ Record';
  document.getElementById('recordBtn').classList.remove('recording');
  
  if (recordedNotes.length > 0) {
    const duration = Math.floor((Date.now() - recordStartTime) / 1000);
    const rec = {
      id: Date.now(),
      name: `Recording ${recordings.length + 1}`,
      notes: recordedNotes,
      duration: `${Math.floor(duration/60)}:${(duration%60).toString().padStart(2,'0')}`,
      noteCount: recordedNotes.length,
      date: new Date().toLocaleDateString(),
    };
    recordings.unshift(rec);
    localStorage.setItem('pv_recordings', JSON.stringify(recordings));
    renderRecordings();
    PVAnalytics.track('recording');
    PVToast.show(`Recording saved! ${rec.noteCount} notes, ${rec.duration}`, 'success');
  } else {
    PVToast.show('No notes recorded.', 'info');
  }
}

document.getElementById('recordBtn').addEventListener('click', () => {
  isRecording ? stopRecording() : startRecording();
});

// ─── Recordings Panel ────────────────────────────
function renderRecordings() {
  const body = document.getElementById('recPanelBody');
  if (recordings.length === 0) {
    body.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:0.85rem;padding:40px 20px;"><div style="font-size:2rem;margin-bottom:12px;">🎙</div>No recordings yet.<br>Hit Record to start.</div>';
    return;
  }
  
  body.innerHTML = recordings.map(r => `
    <div class="rec-item" id="rec-${r.id}">
      <div class="rec-item-name">${r.name}</div>
      <div class="rec-item-meta">⏱ ${r.duration} &nbsp;·&nbsp; ${r.noteCount} notes &nbsp;·&nbsp; ${r.date}</div>
      <div class="rec-item-actions">
        <button class="rec-action-btn" onclick="playbackRecording(${r.id})">▶ Play</button>
        <button class="rec-action-btn" onclick="renameRecording(${r.id})">✏️ Rename</button>
        <button class="rec-action-btn" onclick="deleteRecording(${r.id})" style="color:var(--accent-pink)">🗑 Del</button>
      </div>
    </div>
  `).join('');
}

document.getElementById('toggleRecPanel').addEventListener('click', () => {
  document.getElementById('recordingsPanel').classList.toggle('open');
  renderRecordings();
});

function playbackRecording(id) {
  const rec = recordings.find(r => r.id === id);
  if (!rec || rec.notes.length === 0) return;
  PVToast.show(`Playing: ${rec.name}`, 'info');
  rec.notes.forEach(n => {
    setTimeout(() => {
      PVAudio.play(n.note, n.oct);
      showNote(`${n.note}${n.oct}`);
    }, n.time);
  });
}

function renameRecording(id) {
  const rec = recordings.find(r => r.id === id);
  if (!rec) return;
  const name = prompt('Rename recording:', rec.name);
  if (name) {
    rec.name = name;
    localStorage.setItem('pv_recordings', JSON.stringify(recordings));
    renderRecordings();
  }
}

function deleteRecording(id) {
  recordings = recordings.filter(r => r.id !== id);
  localStorage.setItem('pv_recordings', JSON.stringify(recordings));
  renderRecordings();
  PVToast.show('Recording deleted', 'info');
}

// ─── Key Map Display ─────────────────────────────
function updateKeyMap() {
  const km = document.getElementById('keyMap');
  const visible = [
    ['a','C'], ['w','C#'], ['s','D'], ['e','D#'], ['d','E'], ['f','F'],
    ['t','F#'], ['g','G'], ['y','G#'], ['h','A'], ['u','A#'], ['j','B'],
    ['k','C+1'], ['Space','Sustain'],
  ];
  km.innerHTML = visible.map(([k, n]) => `
    <div class="key-map-item">
      <span class="key-chip">${k.toUpperCase()}</span>
      <span>${n}</span>
    </div>
  `).join('');
}

// ─── URL Params ──────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const layoutParam = urlParams.get('layout');
const validLayouts = LAYOUTS.map(l => l.id);
const startLayout = (layoutParam && validLayouts[parseInt(layoutParam)]) ? validLayouts[parseInt(layoutParam)] : 'classic88';

// ─── Init ────────────────────────────────────────
buildLayoutSwitcher();
buildKeyboard(startLayout);
renderRecordings();

// Hamburger
document.getElementById('hamburger').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('open');
});

PVToast.show('Click keys or use keyboard (A-M, W/E/T/Y/U/O)', 'info', 4000);
</script>
</body>
</html>
