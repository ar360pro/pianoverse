<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse 200+ piano songs — from Beethoven to pop hits. Filter by difficulty and start learning.">
  <title>Song Library | PianoVerse</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Piano<span>Verse</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="play.html">Play</a></li>
      <li><a href="songs.html" class="active">Songs</a></li>
      <li><a href="learn.html">Learn</a></li>
      <li><a href="themes.html">Themes</a></li>
      <li><a href="download.html">Download</a></li>
    </ul>
    <div class="nav-cta">
      <a href="play.html" class="btn btn-primary">🎹 Play Now</a>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<div style="padding-top:100px;min-height:100vh;">
  <div class="container">
    <div class="section-header" style="text-align:left;margin-bottom:40px;">
      <div class="section-tag">Library</div>
      <h1 class="section-title" style="text-align:left;">Song Library</h1>
      <p style="color:var(--text-secondary);">200+ songs from classical to pop. Filter by difficulty and start playing today.</p>
    </div>

    <div class="songs-header">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="toolbar-btn active" onclick="filterByDiff('', this)">All</button>
        <button class="toolbar-btn" onclick="filterByDiff('beginner', this)">🟢 Beginner</button>
        <button class="toolbar-btn" onclick="filterByDiff('intermediate', this)">🟡 Intermediate</button>
        <button class="toolbar-btn" onclick="filterByDiff('advanced', this)">🔴 Advanced</button>
      </div>
      <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="songSearch" placeholder="Search songs, artists…" oninput="filterSongs()">
      </div>
    </div>

    <div id="genreFilter" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px;"></div>

    <div class="song-grid" id="songGrid"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="assets/js/app.js"></script>
<script>
const SONGS = [
  { id:1, title:'Für Elise', artist:'Beethoven', difficulty:'beginner', genre:'Classical', emoji:'🎻', from:'#1e3a5f', to:'#0a1e3a', duration:'3:02', plays:45200 },
  { id:2, title:'Moonlight Sonata', artist:'Beethoven', difficulty:'intermediate', genre:'Classical', emoji:'🌙', from:'#1a1040', to:'#080820', duration:'5:47', plays:38100 },
  { id:3, title:'Clair de Lune', artist:'Debussy', difficulty:'intermediate', genre:'Classical', emoji:'✨', from:'#0d2040', to:'#051020', duration:'5:10', plays:31500 },
  { id:4, title:'Bohemian Rhapsody', artist:'Queen', difficulty:'advanced', genre:'Rock', emoji:'🎸', from:'#3d0020', to:'#1a000e', duration:'5:55', plays:28700 },
  { id:5, title:'River Flows in You', artist:'Yiruma', difficulty:'beginner', genre:'Contemporary', emoji:'🌊', from:'#0a3040', to:'#041820', duration:'3:40', plays:52100 },
  { id:6, title:'Canon in D', artist:'Pachelbel', difficulty:'intermediate', genre:'Classical', emoji:'🎹', from:'#1e1a00', to:'#0e0d00', duration:'4:28', plays:33400 },
  { id:7, title:'Gymnopédie No.1', artist:'Satie', difficulty:'beginner', genre:'Classical', emoji:'🍃', from:'#0a2a1a', to:'#051410', duration:'3:06', plays:29800 },
  { id:8, title:'Bohemian Like You', artist:'Dandy Warhols', difficulty:'beginner', genre:'Pop', emoji:'🎤', from:'#2a0a3a', to:'#140520', duration:'3:28', plays:18200 },
  { id:9, title:'Yesterday', artist:'Beatles', difficulty:'beginner', genre:'Pop', emoji:'🎶', from:'#3a1800', to:'#1e0c00', duration:'2:05', plays:41800 },
  { id:10, title:'La Campanella', artist:'Liszt', difficulty:'advanced', genre:'Classical', emoji:'🔔', from:'#1a0d3a', to:'#0d061e', duration:'5:00', plays:15200 },
  { id:11, title:'The Entertainer', artist:'Joplin', difficulty:'intermediate', genre:'Ragtime', emoji:'🎩', from:'#2a1a00', to:'#140d00', duration:'3:22', plays:19300 },
  { id:12, title:'Prelude in C Major', artist:'Bach', difficulty:'beginner', genre:'Classical', emoji:'🏛', from:'#001a2a', to:'#000d14', duration:'2:15', plays:24600 },
];

let activeGenre = '';
let activeDiff = '';

const genres = [...new Set(SONGS.map(s => s.genre))];
const genreEl = document.getElementById('genreFilter');
genreEl.innerHTML = `<button class="toolbar-btn active" onclick="filterByGenre('', this)">All Genres</button>` +
  genres.map(g => `<button class="toolbar-btn" onclick="filterByGenre('${g}', this)">${g}</button>`).join('');

function filterSongs() {
  const q = document.getElementById('songSearch').value.toLowerCase();
  const filtered = SONGS.filter(s => {
    const matchQ = !q || s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q);
    const matchDiff = !activeDiff || s.difficulty === activeDiff;
    const matchGenre = !activeGenre || s.genre === activeGenre;
    return matchQ && matchDiff && matchGenre;
  });
  renderSongs(filtered);
}

function filterByDiff(diff, btn) {
  activeDiff = diff;
  document.querySelectorAll('.songs-header .toolbar-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterSongs();
}

function filterByGenre(genre, btn) {
  activeGenre = genre;
  document.querySelectorAll('#genreFilter .toolbar-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterSongs();
}

function renderSongs(list = SONGS) {
  const tagClass = { beginner:'tag-beginner', intermediate:'tag-intermediate', advanced:'tag-advanced' };
  document.getElementById('songGrid').innerHTML = list.map(s => `
    <div class="song-card" onclick="playSong(${s.id})">
      <div class="song-thumb" style="--from:${s.from};--to:${s.to}">
        <span style="font-size:2.5rem;">${s.emoji}</span>
      </div>
      <div class="song-body">
        <div class="song-title">${s.title}</div>
        <div class="song-meta">
          <span>${s.artist}</span>
          <span>⏱ ${s.duration}</span>
          <span>▶ ${s.plays.toLocaleString()}</span>
        </div>
        <div style="margin-top:10px;display:flex;align-items:center;justify-content:space-between;">
          <span class="song-tag ${tagClass[s.difficulty]}">${s.difficulty}</span>
          <span style="font-size:0.75rem;color:var(--text-muted);">${s.genre}</span>
        </div>
      </div>
    </div>
  `).join('') || '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-muted);">No songs found. Try a different filter.</div>';
}

function playSong(id) {
  const song = SONGS.find(s => s.id === id);
  if (song) {
    PVAnalytics.track('song_play', { song: song.title });
    PVToast.show(`🎵 Opening: ${song.title} by ${song.artist}`, 'success');
    setTimeout(() => window.location.href = `learn.html?song=${id}`, 800);
  }
}

renderSongs();
window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50));
document.getElementById('hamburger').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('open'));
</script>
</body>
</html>
